name: Build Gridea for Windows ARM64

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-arm64:
    runs-on: windows-latest

    strategy:
      matrix:
        node-version:
          - 16.x

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Windows ARM64 artifacts
        run: yarn electron:build:win-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gridea-win-arm64
          if-no-files-found: error
          path: |
            dist_electron/*.exe
            dist_electron/*.zip
            dist_electron/*.yml
            dist_electron/*.blockmap
            dist_electron/win-arm64-unpacked/**
