name: Build Gridea for Windows ARM64

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-arm64:
    runs-on: windows-latest

    strategy:
      matrix:
        node-version:
          - 16.x

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Windows ARM64 artifacts
        run: yarn electron:build:win-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Windows ARM64 installer
        shell: powershell
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $sourceDir = Resolve-Path 'dist_electron\win-arm64-unpacked'
          $outputFile = Join-Path (Resolve-Path 'dist_electron') "Gridea-Setup-$version-arm64.exe"
          makensis /DAPP_NAME=Gridea /DVERSION=$version /DSOURCE_DIR="$sourceDir" /DOUTPUT_FILE="$outputFile" .github\installers\gridea-arm64-installer.nsi

      - name: Upload Windows ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gridea-win-arm64
          if-no-files-found: error
          path: |
            dist_electron/*.exe
            dist_electron/*.zip
            dist_electron/*.yml
            dist_electron/*.blockmap
            dist_electron/win-arm64-unpacked/**
